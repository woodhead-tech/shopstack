---
# Deploy Traefik reverse proxy for ShopStack.
# Installs Traefik as a systemd binary service (not Docker).
# Handles TLS via Let's Encrypt DNS-01 challenge through Cloudflare.
# Other playbooks drop their dynamic route configs into /etc/traefik/dynamic/.
#
# Variables:
#   domain          Base domain, e.g. "yourclinic.com" (required)
#   cf_api_token    Cloudflare API token with Zone:DNS:Edit (required)
#   acme_email      Email for Let's Encrypt registration (required)
#   traefik_version Traefik release tag (default: v3.2.0)

- name: Deploy Traefik reverse proxy
  hosts: shopstack
  vars:
    traefik_version: "v3.2.0"
    traefik_arch: "linux_amd64"
    traefik_bin: /usr/local/bin/traefik
    traefik_config_dir: /etc/traefik
    traefik_dynamic_dir: /etc/traefik/dynamic
    traefik_user: traefik
    traefik_group: traefik
    domain: ""
    cf_api_token: ""
    acme_email: ""

  tasks:
    - name: Assert required variables
      ansible.builtin.assert:
        that:
          - domain != ""
          - cf_api_token != ""
          - acme_email != ""
        fail_msg: "domain, cf_api_token, and acme_email are required"

    - name: Install ca-certificates and curl
      ansible.builtin.apt:
        name: [ca-certificates, curl]
        state: present
        update_cache: true

    - name: Create traefik system user
      ansible.builtin.user:
        name: "{{ traefik_user }}"
        system: true
        shell: /usr/sbin/nologin
        create_home: false

    - name: Check if Traefik is already installed
      ansible.builtin.stat:
        path: "{{ traefik_bin }}"
      register: traefik_installed

    - name: Download Traefik binary
      ansible.builtin.get_url:
        url: "https://github.com/traefik/traefik/releases/download/{{ traefik_version }}/traefik_{{ traefik_version }}_{{ traefik_arch }}.tar.gz"
        dest: /tmp/traefik.tar.gz
        mode: "0644"
        timeout: 120
      when: not traefik_installed.stat.exists

    - name: Extract Traefik binary
      ansible.builtin.unarchive:
        src: /tmp/traefik.tar.gz
        dest: /usr/local/bin/
        remote_src: true
        mode: "0755"
      when: not traefik_installed.stat.exists

    - name: Remove download archive
      ansible.builtin.file:
        path: /tmp/traefik.tar.gz
        state: absent

    - name: Create Traefik config directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ traefik_user }}"
        group: "{{ traefik_group }}"
        mode: "0755"
      loop:
        - "{{ traefik_config_dir }}"
        - "{{ traefik_dynamic_dir }}"

    - name: Create access log directory
      ansible.builtin.file:
        path: /var/log/traefik
        state: directory
        owner: "{{ traefik_user }}"
        group: "{{ traefik_group }}"
        mode: "0755"

    - name: Deploy Traefik static configuration
      ansible.builtin.template:
        src: traefik.yml.j2
        dest: "{{ traefik_config_dir }}/traefik.yml"
        owner: "{{ traefik_user }}"
        group: "{{ traefik_group }}"
        mode: "0644"
      notify: Restart Traefik

    - name: Deploy Cloudflare credentials for ACME
      ansible.builtin.copy:
        content: "CF_DNS_API_TOKEN={{ cf_api_token }}\n"
        dest: "{{ traefik_config_dir }}/cloudflare.env"
        owner: "{{ traefik_user }}"
        group: "{{ traefik_group }}"
        mode: "0600"
      no_log: true
      notify: Restart Traefik

    - name: Create ACME certificate storage file
      ansible.builtin.file:
        path: "{{ traefik_config_dir }}/acme.json"
        state: touch
        owner: "{{ traefik_user }}"
        group: "{{ traefik_group }}"
        mode: "0600"
        modification_time: preserve
        access_time: preserve

    - name: Deploy Traefik systemd service
      ansible.builtin.copy:
        content: |
          [Unit]
          Description=Traefik Reverse Proxy
          Documentation=https://doc.traefik.io/traefik/
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=notify
          User={{ traefik_user }}
          Group={{ traefik_group }}
          EnvironmentFile=-{{ traefik_config_dir }}/cloudflare.env
          ExecStart={{ traefik_bin }} --configFile={{ traefik_config_dir }}/traefik.yml
          Restart=on-failure
          RestartSec=5
          LimitNOFILE=65536
          AmbientCapabilities=CAP_NET_BIND_SERVICE
          CapabilityBoundingSet=CAP_NET_BIND_SERVICE
          NoNewPrivileges=true
          ProtectSystem=strict
          ProtectHome=true
          ReadWritePaths={{ traefik_config_dir }} /var/log/traefik
          PrivateTmp=true

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/traefik.service
        mode: "0644"
      notify:
        - Reload systemd
        - Restart Traefik

    - name: Enable and start Traefik
      ansible.builtin.systemd:
        name: traefik
        enabled: true
        state: started

  handlers:
    - name: Reload systemd
      ansible.builtin.systemd:
        daemon_reload: true

    - name: Restart Traefik
      ansible.builtin.systemd:
        name: traefik
        state: restarted
