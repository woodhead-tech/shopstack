---
# Deploy PostgreSQL as the shared database backend for ShopStack.
# Runs as a system service (not Docker) for reliability as a base dependency.
#
# Variables:
#   postgres_version      PostgreSQL major version (default: 16)
#   postgres_password     postgres superuser password (required)
#   nextcloud_db_name     Database name for Nextcloud (default: nextcloud)
#   nextcloud_db_user     Database user for Nextcloud (default: nextcloud)
#   nextcloud_db_pass     Database password for Nextcloud (required)
#   extra_databases       List of {name, user, password} for additional databases

- name: Deploy PostgreSQL
  hosts: shopstack
  vars:
    postgres_version: 16
    postgres_password: ""
    nextcloud_db_name: nextcloud
    nextcloud_db_user: nextcloud
    nextcloud_db_pass: ""
    extra_databases: []

  tasks:
    - name: Install prerequisites for PGDG repo
      ansible.builtin.apt:
        name: [ca-certificates, curl, gnupg, acl]
        state: present
        update_cache: true

    - name: Add PostgreSQL PGDG apt key
      ansible.builtin.shell:
        cmd: curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /etc/apt/keyrings/pgdg.gpg
        creates: /etc/apt/keyrings/pgdg.gpg

    - name: Set PGDG key permissions
      ansible.builtin.file:
        path: /etc/apt/keyrings/pgdg.gpg
        mode: "0644"

    - name: Add PostgreSQL PGDG apt repository
      ansible.builtin.copy:
        content: "deb [signed-by=/etc/apt/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt bookworm-pgdg main\n"
        dest: /etc/apt/sources.list.d/pgdg.list
        mode: "0644"

    - name: Install PostgreSQL
      ansible.builtin.apt:
        name:
          - "postgresql-{{ postgres_version }}"
          - python3-psycopg2
        state: present
        update_cache: true

    - name: Ensure PostgreSQL is started and enabled
      ansible.builtin.systemd:
        name: postgresql
        state: started
        enabled: true

    - name: Write database setup script
      ansible.builtin.copy:
        dest: /tmp/shopstack-db-setup.sh
        mode: "0700"
        content: |
          #!/bin/bash
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD '{{ postgres_password }}';"
          sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ nextcloud_db_user }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE USER {{ nextcloud_db_user }} WITH PASSWORD '{{ nextcloud_db_pass }}';"
          sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ nextcloud_db_name }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE DATABASE {{ nextcloud_db_name }} OWNER {{ nextcloud_db_user }};"

    - name: Run database setup script
      ansible.builtin.shell: /tmp/shopstack-db-setup.sh
      changed_when: true

    - name: Remove database setup script
      ansible.builtin.file:
        path: /tmp/shopstack-db-setup.sh
        state: absent

    - name: Write extra databases setup script
      ansible.builtin.copy:
        dest: /tmp/shopstack-extra-db-setup.sh
        mode: "0700"
        content: |
          #!/bin/bash
          {% for db in extra_databases %}
          sudo -u postgres psql -tc "SELECT 1 FROM pg_roles WHERE rolname='{{ db.user }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE USER {{ db.user }} WITH PASSWORD '{{ db.password }}';"
          sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname='{{ db.name }}'" | grep -q 1 || \
            sudo -u postgres psql -c "CREATE DATABASE {{ db.name }} OWNER {{ db.user }};"
          {% endfor %}
      when: extra_databases | length > 0

    - name: Run extra databases setup script
      ansible.builtin.shell: /tmp/shopstack-extra-db-setup.sh
      when: extra_databases | length > 0
      changed_when: true

    - name: Remove extra databases setup script
      ansible.builtin.file:
        path: /tmp/shopstack-extra-db-setup.sh
        state: absent
      when: extra_databases | length > 0

    - name: Configure PostgreSQL to listen on localhost only
      ansible.builtin.lineinfile:
        path: "/etc/postgresql/{{ postgres_version }}/main/postgresql.conf"
        regexp: "^#?listen_addresses"
        line: "listen_addresses = 'localhost'"
      notify: Restart PostgreSQL

  handlers:
    - name: Restart PostgreSQL
      ansible.builtin.systemd:
        name: postgresql
        state: restarted
