---
# ShopStack master playbook — deploys the full small-business infrastructure stack.
#
# Deployment order:
#   1. postgres     — shared database backend (Nextcloud depends on this)
#   2. traefik      — reverse proxy + TLS (all web services depend on this)
#   3. authentik    — SSO identity provider (protects admin interfaces)
#   4. wireguard    — remote management tunnel
#   5. mailcow      — email server
#   6. nextcloud    — file storage
#   7. uptime-kuma  — internal uptime monitoring
#   8. invoicing    — Invoice Ninja (invoicing + Stripe)
#   9. spoke        — WireGuard management tunnel back to hub
#  10. woocommerce  — WordPress + WooCommerce (ShopStack Online only; set enable_woocommerce=true)
#
# Usage:
#   ansible-playbook shopstack.yml -i inventory.ini \
#     --extra-vars "@profiles/on-prem.yml" \
#     --extra-vars "domain=yourclinic.com cf_api_token=... acme_email=... \
#                   postgres_password=... nextcloud_db_pass=... nextcloud_admin_pass=..."
#
# Profile vars files:
#   profiles/on-prem.yml  — Beelink mini PC (bare metal, on-site)
#   profiles/aws.yml      — AWS EC2 instance
#   profiles/gcp.yml      — GCP Compute Engine instance
#
# Required vars (must be passed or set in vault):
#   domain              Base domain, e.g. yourclinic.com
#   cf_api_token        Cloudflare API token for DNS-01 TLS
#   acme_email          Email for Let's Encrypt registration
#   postgres_password   PostgreSQL superuser password
#   nextcloud_db_pass   Nextcloud database password
#   nextcloud_admin_pass  Nextcloud admin password
#   mailcow_domain      Mail domain (usually same as domain)
#   mailcow_hostname    Hostname for mail server, e.g. mail.yourclinic.com
#   customer_name       Short identifier, e.g. tshirts-demo (used by spoke)
#   wg_spoke_ip         Management WireGuard IP, e.g. 10.99.0.2 (from 10.99.0.0/24)
#                       Hub must be set up first: make wireguard-shopstack (homelab repo)
#
# ShopStack Online vars (required when enable_woocommerce=true):
#   enable_woocommerce  true to deploy WooCommerce (default: false)
#   woocommerce_db_pass MariaDB password for WordPress
#   wp_admin_pass       WordPress admin password
#   wp_admin_user       Admin username (default: admin)
#   wp_admin_email      Admin email (default: admin@<domain>)
#   wp_site_title       Store name (default: My Store)

- name: 1. Deploy PostgreSQL
  ansible.builtin.import_playbook: postgres/playbook.yml
  vars:
    nextcloud_db_name: nextcloud
    nextcloud_db_user: nextcloud

- name: 2. Deploy Traefik
  ansible.builtin.import_playbook: traefik/playbook.yml

- name: 3. Deploy Authentik
  ansible.builtin.import_playbook: authentik/playbook.yml

- name: 4. Deploy WireGuard
  ansible.builtin.import_playbook: wireguard/playbook.yml
  vars:
    wg_endpoint: "wg.{{ domain }}"
    wg_allowed_ips: "10.10.0.0/24"

- name: 5. Deploy Mailcow
  ansible.builtin.import_playbook: mailcow/playbook.yml
  vars:
    mailcow_domain: "{{ domain }}"
    mailcow_hostname: "mail.{{ domain }}"

- name: 6. Deploy Nextcloud
  ansible.builtin.import_playbook: nextcloud/playbook.yml
  vars:
    nextcloud_domain: "files.{{ domain }}"

- name: 7. Deploy Uptime Kuma
  ansible.builtin.import_playbook: uptime-kuma/playbook.yml

- name: 8. Deploy Invoice Ninja (invoicing + payment collection)
  ansible.builtin.import_playbook: invoicing/playbook.yml
  vars:
    invoiceninja_app_key: "{{ invoiceninja_app_key }}"

- name: 9. Deploy management spoke (connects box back to Brandon's hub for remote ops)
  ansible.builtin.import_playbook: spoke/playbook.yml
  vars:
    wg_spoke_ip: "{{ wg_spoke_ip }}"
    customer_name: "{{ customer_name }}"

- name: 10. Deploy WooCommerce (ShopStack Online tier — disabled by default)
  ansible.builtin.import_playbook: woocommerce/playbook.yml
