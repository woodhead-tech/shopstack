---
# Deploy Authentik identity provider for ShopStack.
# Provides SSO protecting admin interfaces (Uptime Kuma, Nextcloud admin, etc.).
# Runs via Docker Compose with its own bundled PostgreSQL (port 5433) and Redis.
# Configures Traefik forwardAuth so protected services can require login.
#
# Variables:
#   domain              Base domain, e.g. "yourclinic.com" (required)
#   authentik_version   Authentik image tag (default: 2024.12.3)
#   authentik_install_dir  Install path (default: /opt/authentik)

- name: Deploy Authentik identity provider
  hosts: shopstack
  vars:
    domain: ""
    authentik_version: "2024.12.3"
    authentik_install_dir: /opt/authentik

  tasks:
    - name: Assert required variables
      ansible.builtin.assert:
        that:
          - domain != ""
        fail_msg: "domain is required"

    - name: Install prerequisites
      ansible.builtin.apt:
        name: [ca-certificates, curl, gnupg, openssl]
        state: present
        update_cache: true

    - name: Create Docker keyring directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set Docker GPG key permissions
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Add Docker repository
      ansible.builtin.copy:
        content: |
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable
        dest: /etc/apt/sources.list.d/docker.list
        mode: "0644"

    - name: Install Docker CE
      ansible.builtin.apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present
        update_cache: true

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Create Authentik directories
      ansible.builtin.file:
        path: "{{ authentik_install_dir }}/{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - ""
        - media
        - certs
        - templates
        - postgres
        - redis

    - name: Check if .env already exists
      ansible.builtin.stat:
        path: "{{ authentik_install_dir }}/.env"
      register: env_file

    - name: Generate PostgreSQL password
      ansible.builtin.shell:
        cmd: openssl rand -hex 24
      register: pg_pass_result
      changed_when: false
      when: not env_file.stat.exists

    - name: Generate Authentik secret key
      ansible.builtin.shell:
        cmd: openssl rand -hex 32
      register: secret_key_result
      changed_when: false
      when: not env_file.stat.exists

    - name: Write .env file
      ansible.builtin.copy:
        content: |
          PG_PASS={{ pg_pass_result.stdout }}
          AUTHENTIK_SECRET_KEY={{ secret_key_result.stdout }}
          AUTHENTIK_ERROR_REPORTING__ENABLED=false
        dest: "{{ authentik_install_dir }}/.env"
        mode: "0600"
      when: not env_file.stat.exists
      no_log: true

    - name: Deploy docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ authentik_install_dir }}/docker-compose.yml"
        mode: "0644"
      notify: Restart Authentik

    - name: Start Authentik stack
      ansible.builtin.command:
        cmd: docker compose up -d
        chdir: "{{ authentik_install_dir }}"
      changed_when: true

    - name: Wait for Authentik to be healthy (migrations take ~60s on first boot)
      ansible.builtin.uri:
        url: "http://localhost:9000/-/health/live/"
        return_content: false
        status_code: 204
      register: health_check
      until: health_check.status == 204
      retries: 18
      delay: 10

    - name: Deploy Traefik dynamic config for Authentik
      ansible.builtin.copy:
        content: |
          http:
            routers:
              authentik:
                rule: "Host(`auth.{{ domain }}`)"
                entryPoints: [websecure]
                service: authentik
                tls:
                  certResolver: cloudflare
              authentik-outpost:
                rule: "PathPrefix(`/outpost.goauthentik.io/`)"
                entryPoints: [websecure]
                service: authentik
                tls:
                  certResolver: cloudflare
                priority: 15
            services:
              authentik:
                loadBalancer:
                  servers:
                    - url: "http://127.0.0.1:9000"
            middlewares:
              authentik:
                forwardAuth:
                  address: "http://127.0.0.1:9000/outpost.goauthentik.io/auth/traefik"
                  trustForwardHeader: true
                  authResponseHeaders:
                    - X-authentik-username
                    - X-authentik-groups
                    - X-authentik-email
                    - X-authentik-name
                    - X-authentik-uid
                    - X-authentik-jwt
                    - X-authentik-meta-jwks
                    - X-authentik-meta-outpost
                    - X-authentik-meta-provider
                    - X-authentik-meta-app
                    - X-authentik-meta-version
        dest: /etc/traefik/dynamic/authentik.yml
        mode: "0644"
      notify: Reload Traefik

    - name: Deployment summary
      ansible.builtin.debug:
        msg:
          - "Authentik deployed to {{ authentik_install_dir }}"
          - "Internal URL: http://localhost:9000"
          - "External URL: https://auth.{{ domain }}"
          - ""
          - "Next steps:"
          - "  1. Browse to https://auth.{{ domain }}/if/flow/initial-setup/"
          - "  2. Create your admin account"
          - "  3. Admin > Applications > Providers > Create > Proxy Provider"
          - "     - Mode: Forward auth (domain level)"
          - "     - External host: https://auth.{{ domain }}"
          - "  4. Admin > Applications > Create, assign the provider"
          - "  5. Admin > Outposts > Edit default outpost, add the application"
          - "  To protect a service, add to its Traefik router: middlewares: [authentik@file]"

  handlers:
    - name: Restart Authentik
      ansible.builtin.command:
        cmd: docker compose up -d --force-recreate
        chdir: "{{ authentik_install_dir }}"
      changed_when: true

    - name: Reload Traefik
      ansible.builtin.systemd:
        name: traefik
        state: reloaded
