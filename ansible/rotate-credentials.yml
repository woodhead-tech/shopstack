---
# Master playbook for automated credential rotation of ShopStack customer boxes.
# 🤖 Autogenerated by ClawBot

- name: Rotate ShopStack customer credentials
  hosts: shopstack
  gather_facts: true
  
  # Ensure we have the customer_name variable
  pre_tasks:
    - name: Assert customer_name is defined
      ansible.builtin.assert:
        that: customer_name is defined
        fail_msg: "customer_name must be defined for rotation"

  roles:
    - rotate-ssh-keys
    - rotate-app-passwords
    - rotate-wireguard-keys
    - persist-secrets
