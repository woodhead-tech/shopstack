---
# tasks/main.yml for rotate-wireguard-keys
# 🤖 Autogenerated by ClawBot

- name: 1. Generate new WireGuard keypair and PSK on spoke
  ansible.builtin.shell:
    cmd: |
      new_priv=$(wg genkey)
      new_pub=$(echo "$new_priv" | wg pubkey)
      new_psk=$(wg genpsk)
      echo "$new_priv" > /etc/wireguard/wg-hub_private.key
      echo "$new_psk" > /etc/wireguard/wg-hub_preshared.key
      echo "$new_pub" > /etc/wireguard/wg-hub_public.key
      echo "priv=$new_priv;pub=$new_pub;psk=$new_psk"
  register: wg_keys_raw
  no_log: true

- name: 2. Parse new WireGuard keys
  ansible.builtin.set_fact:
    new_wg_priv: "{{ (wg_keys_raw.stdout | split(';') | select('search', 'priv=') | first | split('='))[1] }}"
    new_wg_pub: "{{ (wg_keys_raw.stdout | split(';') | select('search', 'pub=') | first | split('='))[1] }}"
    new_wg_psk: "{{ (wg_keys_raw.stdout | split(';') | select('search', 'psk=') | first | split('='))[1] }}"
  no_log: true

- name: 3. Update WireGuard config on spoke
  ansible.builtin.template:
    src: ../spoke/wg-hub.conf.j2
    dest: /etc/wireguard/wg-hub.conf
    mode: "0600"
  notify: Restart WireGuard Spoke

- name: 4. Force restart WireGuard Spoke
  ansible.builtin.systemd:
    name: wg-quick@wg-hub
    state: restarted

- name: 5. Write peer info for local fetch
  ansible.builtin.copy:
    content: |
      customer_name: {{ customer_name }}
      wg_ip: {{ wg_spoke_ip }}
      public_key: {{ new_wg_pub }}
      preshared_key: {{ new_wg_psk }}
    dest: /tmp/{{ customer_name }}-peer.yml
    mode: "0600"
  no_log: true

- name: 6. Fetch peer info locally
  ansible.builtin.fetch:
    src: /tmp/{{ customer_name }}-peer.yml
    dest: "{{ playbook_dir }}/spoke/peers/{{ customer_name }}.yml"
    flat: true

- name: 7. Update central Hub with new peer info
  ansible.builtin.shell:
    cmd: "make shopstack-add-peer CLIENT={{ customer_name }} WG_IP={{ wg_spoke_ip }}"
    chdir: "{{ lookup('env', 'HOME') }}/Projects/woodhead-tech/proxmox_kubernetes_cluster"
  delegate_to: localhost
  become: false

- name: 8. Store new WireGuard keys in facts for encryption
  set_fact:
    rotated_credentials: "{{ rotated_credentials | default({}) | combine({
        'wg_spoke_private_key': new_wg_priv,
        'wg_spoke_preshared_key': new_wg_psk
      }) }}"
  no_log: true
