---
# tasks/main.yml for persist-secrets
# 🤖 Autogenerated by ClawBot

- name: 1. Ensure secrets directory exists
  ansible.builtin.file:
    path: "{{ secrets_dir | default(playbook_dir + '/../secrets') }}"
    state: directory
    mode: '0700'
  delegate_to: localhost

- name: 2. Write rotated credentials to temporary JSON file
  ansible.builtin.copy:
    content: "{{ rotated_credentials | to_nice_json }}"
    dest: "/tmp/{{ customer_name }}_secrets.json"
    mode: '0600'
  delegate_to: localhost
  no_log: true

- name: 3. Encrypt JSON file with age
  ansible.builtin.shell:
    cmd: "age -r {{ hub_age_pubkey }} -o {{ secrets_dir | default(playbook_dir + '/../secrets') }}/{{ customer_name }}_{{ ansible_date_time.epoch }}.age /tmp/{{ customer_name }}_secrets.json"
  delegate_to: localhost
  vars:
    hub_age_pubkey: "age1rc7trq65uvqnq5yam7n0r402tyh7mfac7l5rrrx7v8acy6m6cyuslyj4xj"

- name: 4. Securely remove temporary JSON file
  ansible.builtin.file:
    path: "/tmp/{{ customer_name }}_secrets.json"
    state: absent
  delegate_to: localhost
