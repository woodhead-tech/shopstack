---
# tasks/main.yml for rotate-ssh-keys
# 🤖 Autogenerated by ClawBot

- name: 1. Generate new SSH keypair in memory
  ansible.builtin.openssh_keypair:
    path: "/tmp/{{ customer_name }}_new_ed25519"
    type: ed25519
    state: present
  delegate_to: localhost
  register: new_key_info

- name: 2. Stage new public key on remote host
  ansible.builtin.authorized_key:
    user: "{{ ansible_user }}"
    state: present
    key: "{{ lookup('file', '/tmp/' + customer_name + '_new_ed25519.pub') }}"
    exclusive: no
  register: staging_result

- name: 3. Verify connection with NEW key
  ansible.builtin.wait_for_connection:
    timeout: 30
  vars:
    ansible_ssh_private_key_file: "/tmp/{{ customer_name }}_new_ed25519"
  when: staging_result.changed

- name: 4. Prune old public key (Transition to NEW as primary)
  ansible.builtin.authorized_key:
    user: "{{ ansible_user }}"
    state: present
    key: "{{ lookup('file', '/tmp/' + customer_name + '_new_ed25519.pub') }}"
    exclusive: yes
  when: staging_result.changed

- name: 5. Store new SSH private key in facts
  set_fact:
    rotated_credentials: "{{ rotated_credentials | default({}) | combine({'ssh_private_key': lookup('file', '/tmp/' + customer_name + '_new_ed25519')}) }}"
  when: staging_result.changed
  no_log: true
