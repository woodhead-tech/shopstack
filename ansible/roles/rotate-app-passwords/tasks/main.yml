---
# tasks/main.yml for rotate-app-passwords
# 🤖 Autogenerated by ClawBot

- name: 1. Generate new Nextcloud admin password
  set_fact:
    new_nextcloud_pass: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

- name: 2. Generate new Mailcow admin password
  set_fact:
    new_mailcow_pass: "{{ lookup('password', '/dev/null length=32 chars=ascii_letters,digits') }}"

- name: 3. Fetch Mailcow API key from mailcow.conf
  ansible.builtin.shell:
    cmd: grep "^API_KEY=" {{ mailcow_install_dir | default('/opt/mailcow') }}/mailcow.conf | cut -d'=' -f2
  register: mailcow_api_key_raw
  changed_when: false

- name: 4. Rotate Nextcloud admin password via OCC
  ansible.builtin.shell:
    cmd: docker exec --user www-data nextcloud-app php occ user:resetpassword {{ nextcloud_admin_user | default('admin') }} --password-from-env
  environment:
    OC_PASS: "{{ new_nextcloud_pass }}"
  register: nc_rotation

- name: 5. Rotate Mailcow admin password via API
  ansible.builtin.shell:
    cmd: |
      curl -sk -X POST "https://localhost:8443/api/v1/edit/admin" \
      -H "X-API-Key: {{ mailcow_api_key_raw.stdout }}" \
      -H "Content-Type: application/json" \
      -d '{"items":["admin"],"attr":{"password":"{{ new_mailcow_pass }}"}}'
  register: mc_rotation
  failed_when: "'success' not in mc_rotation.stdout"

- name: 6. Store new credentials in facts for encryption
  set_fact:
    rotated_credentials: "{{ rotated_credentials | default({}) | combine({
        'nextcloud_admin_pass': new_nextcloud_pass,
        'mailcow_admin_pass': new_mailcow_pass,
        'timestamp': ansible_date_time.iso8601
      }) }}"
