---
# Deploy Uptime Kuma for ShopStack internal monitoring.
# Kuma watches all services and alerts via email or webhook when something goes down.
# Routed through Traefik — accessible only via WireGuard tunnel (not public).
#
# Variables:
#   kuma_version        Image tag (default: latest)
#   kuma_data_dir       Data volume (default: /opt/uptime-kuma/data)
#   kuma_internal_port  Internal port (default: 3001)

- name: Deploy Uptime Kuma
  hosts: shopstack
  vars:
    kuma_version: latest
    kuma_data_dir: /opt/uptime-kuma/data
    kuma_install_dir: /opt/uptime-kuma
    kuma_internal_port: 3001

  tasks:
    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name: [ca-certificates, curl, gnupg]
        state: present
        update_cache: true

    - name: Add Docker GPG key
      ansible.builtin.shell:
        cmd: curl -fsSL https://download.docker.com/linux/debian/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        creates: /etc/apt/keyrings/docker.gpg

    - name: Set Docker GPG key permissions
      ansible.builtin.file:
        path: /etc/apt/keyrings/docker.gpg
        mode: "0644"

    - name: Add Docker repository
      ansible.builtin.copy:
        content: |
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian bookworm stable
        dest: /etc/apt/sources.list.d/docker.list
        mode: "0644"

    - name: Install Docker CE
      ansible.builtin.apt:
        name: [docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin]
        state: present
        update_cache: true

    - name: Create Uptime Kuma directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - "{{ kuma_install_dir }}"
        - "{{ kuma_data_dir }}"

    - name: Create proxy Docker network (idempotent)
      community.docker.docker_network:
        name: proxy
        state: present

    - name: Deploy docker-compose.yml
      ansible.builtin.copy:
        content: |
          services:
            uptime-kuma:
              image: louislam/uptime-kuma:{{ kuma_version }}
              container_name: uptime-kuma
              restart: unless-stopped
              volumes:
                - {{ kuma_data_dir }}:/app/data
              ports:
                - "127.0.0.1:{{ kuma_internal_port }}:3001"
              networks:
                - proxy
          networks:
            proxy:
              external: true
        dest: "{{ kuma_install_dir }}/docker-compose.yml"
        mode: "0644"
      notify: Restart Kuma

    - name: Start Uptime Kuma
      community.docker.docker_compose_v2:
        project_src: "{{ kuma_install_dir }}"
        state: present

  handlers:
    - name: Restart Kuma
      community.docker.docker_compose_v2:
        project_src: "{{ kuma_install_dir }}"
        state: present
        recreate: always
